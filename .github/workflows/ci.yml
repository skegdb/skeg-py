name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: skegdb/.github/.github/workflows/python-ci.yml@main

  integration:
    name: Integration (skeg server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
      - name: build skeg server binaries
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/skegdb/skeg /tmp/skeg-ci-src
          cd /tmp/skeg-ci-src
          cargo build --release -p skeg-server --locked
          echo "SKEG_BIN=/tmp/skeg-ci-src/target/release/skeg" >> "$GITHUB_ENV"
          echo "SKEG_RESP3_BIN=/tmp/skeg-ci-src/target/release/skeg-resp3" >> "$GITHUB_ENV"
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: pytest integration
        run: pytest -q
